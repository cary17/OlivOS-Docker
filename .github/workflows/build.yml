name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if image exists'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Get latest OlivOS release version
        id: version
        run: |
          VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/OlivOS-Team/OlivOS/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to get version" && exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists on GHCR
        id: check
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/olivos:$VERSION > /dev/null 2>&1 \
            && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Image $VERSION already exists on GHCR, skipping build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Image $VERSION not found on GHCR, will build."
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.skip == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (with Docker Hub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: OLIVOS_VERSION=${{ needs.check.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/olivos:${{ needs.check.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/olivos:latest
            ghcr.io/${{ github.repository_owner }}/olivos:${{ needs.check.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/olivos:latest

      - name: Build and push (GHCR only)
        if: steps.dockerhub.outputs.enabled == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: OLIVOS_VERSION=${{ needs.check.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/olivos:${{ needs.check.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/olivos:latest
