name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if image exists'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest OlivOS release version
        id: version
        run: |
          VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/OlivOS-Team/OlivOS/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Failed to get version" && exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/olivos:$VERSION > /dev/null 2>&1 \
            && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Image $VERSION already exists, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Image $VERSION not found, will build."
          fi

      - name: Login to Docker Hub
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: OLIVOS_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/olivos:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/olivos:latest
            ghcr.io/${{ github.repository_owner }}/olivos:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/olivos:latest
